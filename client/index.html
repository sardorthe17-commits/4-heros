<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Arena - Lobby System</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Umumiy oyna dizayni */
        .panel {
            background: #2d2d2d;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5);
            width: 400px;
            text-align: center;
        }

        h2 { margin-top: 0; color: #00ffcc; }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            box-sizing: border-box;
            font-size: 16px;
        }
        input, select { background: #444; color: #fff; }
        button {
            background: #00ffcc;
            color: #1a1a1a;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #00ccaa; }
        
        /* Lobbi ro'yxati */
        #room-list {
            max-height: 150px;
            overflow-y: auto;
            text-align: left;
            background: #222;
            padding: 10px;
            border-radius: 5px;
        }
        .room-item {
            display: flex;
            justify-content: space-between;
            padding: 5px;
            border-bottom: 1px solid #444;
            cursor: pointer;
        }
        .room-item:hover { color: #00ffcc; }

        /* Yashirish uchun klass */
        .hidden { display: none !important; }

        /* Phaser o'yin konteyneri */
        #game-container {
            border: 4px solid #333;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="menu-panel" class="panel">
        <h2>BOSH MENYU</h2>
        <input type="text" id="room-name-input" placeholder="Xona nomini kiriting...">
        <button id="create-room-btn">Yangi Xona (Lobby) Yaratish</button>
        
        <h3 style="text-align: left; margin-top: 20px;">Ochiq Xonalar:</h3>
        <div id="room-list">
            <div style="color: #888; text-align: center;">Hozircha xonalar yo'q...</div>
        </div>
    </div>

    <div id="lobby-panel" class="panel hidden">
        <h2 id="lobby-title">Xona: <span id="current-room-name">...</span></h2>
        
        <h3>Qahramonni Tanlang:</h3>
        <select id="char-select">
            <option value="knight">Knight (Ritsar)</option>
            <option value="archer">Archer (Kamonchi)</option>
            <option value="mage">Mage (Sehrgar)</option>
            <option value="samurai">Samurai (Tezkor jangchi)</option> 
        </select>

        <h3>Xonadagilar (<span id="player-count">0</span>/4):</h3>
        <ul id="player-list" style="text-align: left; background: #222; padding: 10px 25px; border-radius: 5px;">
            </ul>

        <button id="start-game-btn" class="hidden" style="background: #ffcc00;">O'yinni Boshlash (Host)</button>
        <p id="waiting-msg" style="color: #aaa; font-style: italic;">Xona egasi o'yinni boshlashini kuting...</p>
    </div>

    <div id="game-container" class="hidden"></div>

    <script src="lobby.js"></script>
    <script src="game.js"></script>
</body>
</html>
